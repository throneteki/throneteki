apiVersion: batch/v1
kind: Job
metadata:
    name: throneteki-migrate-{{ .Values.deployTime | default "0" }}
    namespace: {{ .Values.namespace }}
    annotations:
        'helm.sh/hook': pre-install,pre-upgrade
        'helm.sh/hook-weight': '1'
        'helm.sh/hook-delete-policy': before-hook-creation
spec:
    ttlSecondsAfterFinished: 300
    activeDeadlineSeconds: 600
    template:
        metadata:
            labels:
                app: throneteki-migrate
        spec:
            restartPolicy: OnFailure
            containers:
                - name: migrate
                  image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
                  command:
                      - sh
                      - -c
                      - |
                          node server/scripts/convertevents.js && \
                          node server/scripts/convertdecks.js
                  env:
                      - name: NODE_CONFIG
                        valueFrom:
                            secretKeyRef:
                                name: throneteki-lobby-secret
                                key: node_config